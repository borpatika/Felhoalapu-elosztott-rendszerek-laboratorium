{% extends "album/base.html" %}

{% block content %}
<h2>Saját képeim</h2>

<ul>
    {% for photo in photos %}
        <li>
            <a href="{% url 'photo_detail' photo.id %}">{{ photo.name }}</a>
            - {{ photo.uploaded_at|date:"Y-m-d H:i" }}
            <a href="{% url 'delete_photo' photo.id %}">Törlés</a>
        </li>
    {% empty %}
        <li>Nincs még feltöltött kép.</li>
    {% endfor %}
</ul>

<a href="{% url 'upload_photo' %}">Új kép feltöltése</a>
{% endblock %}
