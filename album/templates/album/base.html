<!DOCTYPE html>
<html>
<head>
    <title>Fotoalbum</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        .navbar {
            background: #2d3748;
            color: white;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
            font-weight: bold;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        h1,h2 {
            margin-top: 0;
        }

        .btn {
            background: #3182ce;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        .btn:hover {
            background: #2b6cb0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
            gap: 20px;
        }

        .card {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            background: white;
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .card-body {
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }

        .center-image {
            text-align: center;
        }

        .center-image img {
            max-width: 80%;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        form.inline {
            display: inline;
        }

    </style>

</head>
<body>

<div class="navbar">
    <div>
        <a href="{% url 'photo_list' %}">📸 Fotoalbum</a>
    </div>

    <div>
        {% if user.is_authenticated %}
            Üdv, {{ user.username }}
            <a href="{% url 'my_photos' %}">Saját képeim</a>

            <form method="post" action="{% url 'logout' %}" class="inline">
                {% csrf_token %}
                <button class="btn">Kijelentkezés</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Belépés</a>
            <a href="{% url 'register' %}">Regisztráció</a>
        {% endif %}
    </div>
</div>

<div class="container">
{% block content %}
{% endblock %}
</div>

</body>
</html>
